<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thời khóa biểu</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#efefef;
        }

        .wrapper{
            width:95%;
            margin:auto;
            background:#fff;
            border-radius:6px;
            padding:15px;
        }

        /* ===== HEADER ===== */
        .header{
            text-align:center;
            position:relative;
        }

        .print-date{
            position:absolute;
            right:10px;
            top:0;
            font-size:13px;
        }

        .title{
            font-weight:bold;
            font-size:20px;
            margin-top:10px explained;
        }

        .sub{
            font-size:14px;
        }

        /* ===== TABLE ===== */
        table{
            width:100%;
            border-collapse:collapse;
            table-layout:fixed;
            margin-top:15px;
        }

        th, td{
            border:1px solid #dcdcdc;
            text-align:center;
            vertical-align:top;
            padding:6px;
            height:55px;
            font-size:13px;
        }

        th{
            background:#f7f7f7;
            font-weight:bold;
        }

        /* cột tiết */
        .tiet{
            width:70px;
            background:#fafafa;
            color:#777;
        }

        /* cột giờ bên phải */
        .gio{
            width:70px;
            background:#fafafa;
            color:#777;
        }

        /* ===== SUBJECT BOX ===== */
        .subject{
            border-radius:6px;
            padding:6px;
            text-align:left;
            line-height:1.4;
        }

        .green{
            background:#eaf8ec;
            border:2px solid #4CAF50;
        }

        .red{
            background:#fdecec;
            border:2px solid #e53935;
        }

        .subject b{
            display:block;
            margin-bottom:4px;
        }

    </style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <div class="print-date">Ngày in: 28/02/2026</div>

</div>

</body>
